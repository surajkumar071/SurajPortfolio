<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Suraj Kumar - Full Stack & Agentic AI Developer. Building intelligent, performant web applications with modern technology." />
    <meta name="keywords" content="developer, portfolio, react, full-stack, AI, web development" />
    <meta name="author" content="Suraj Kumar" />
    <meta property="og:title" content="Suraj Kumar" />
    <meta property="og:description" content="Explore my portfolio of modern web applications and AI projects." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#000000" />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('theme') || 'dark';
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.style.colorScheme = theme;
          var themeMeta = document.querySelector('meta[name="theme-color"]');
          if (themeMeta) {
            themeMeta.setAttribute('content', theme === 'dark' ? '#000000' : '#fafafa');
          }
        } catch (error) {}
      })();
    </script>
    <title>Suraj Kumar</title>
    <!-- Performance Optimization: Preload critical resources -->
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Async loading for non-critical resources -->
    <link rel="preload" as="image" href="/favicon.png">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
